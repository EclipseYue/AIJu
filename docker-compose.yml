services:
  backend:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend/data:/app/backend/data
      - ${TEXTBOOK_DATA_DIR:-./data/uploads}:/textbooks:ro
    environment:
      TEXTBOOK_DATA_DIR: /textbooks

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/frontend/src
    environment:
      VITE_API_BASE: http://localhost:8000
