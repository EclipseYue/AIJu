services:
  backend:
    image: python:3.11-slim
    working_dir: /app
    command: sh -c "pip install -r requirements.txt && uvicorn app.main:app --app-dir backend --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./:/app
      - ../textbooks:/external_textbooks:ro
    environment:
      TEXTBOOK_DATA_DIR: /external_textbooks

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev:frontend -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ./:/app
    environment:
      VITE_API_BASE: http://localhost:8000
